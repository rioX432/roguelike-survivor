name: Unity Build Check

# Disabled by default — enable when CI runner + Unity license are ready
# on:
#   pull_request:
#     branches: [main]
#     paths:
#       - 'roguelike-survivor-game/**'
#       - '.github/workflows/build-check.yml'
on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: roguelike-survivor-game
          unityVersion: 6000.3.9f1
          targetPlatform: Android
          buildMethod: BuildScript.BuildAndroid

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: build/android/*.apk
          retention-days: 3
